#create pod using manifest.yml 
1) Create Pod using manifest file
apiVersion: v1
kind: Pod
metadata:
  name: prod-1
spec:
  containers:
    - name: cont-1
      image: nginx

2) Create replicaset for the pods
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ib-rs
  labels:
    app: bank
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
        - name: cont-2
          image: charanvardhan/internetbanking:v1

3) Create Replication Controller for the pods
apiVersion: v1
kind: ReplicationController
metadata:
  name: ib-rc
  labels:
    app: bank
spec:
  replicas: 3
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
        - name: cont-1
          image: charanvardhan/internetbanking:v1

4) Create Deployment for the pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ib-dp
  labels:
    app: bank
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
        - name: cont-1
          image: charanvardhan/internetbanking:v1
          ports:
            - containerPort: 80
              hostPort: 80

5)  Create two container in one pod using manifest file
apiVersion: v1
kind: Pod
metadata:
  name: two-container-one-pod
  labels:
    app: multi-container
spec:
  containers:
    - name: nginx-cont
      image: nginx
      ports:
        - containerPort: 80
    - name: busybox-cont
      image: busybox
      command: ["sh","-c","while true; do echo 'Hello from BusyBox'; sleep 10; done"]

6) Create Non-parallel jobs 
apiVersion: batch/v1
kind: Job
metadata:
  name: non-parallel-jobs
spec:
  completions: 3
  template:
    metadata:
      name: one-time-job
    spec:
      containers:
        - name: mycont
          image: busybox
          command: ["echo", "hello from busybox"]
      restartPolicy: Never

7) Create parallel jobs 
apiVersion: batch/v1
kind: Job
metadata:
  name: parallel-job
spec:
  completions: 10
  parallelism: 5
  template:
    metadata:
      name: parallel
    spec:
      containers:
        - name: busybox-cont
          image: busybox
          command: ["echo","Hello from Busybox"]
      restartPolicy: Never

8) Create cron job for every 1 min 
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-job
spec:
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: busybox-cont
              image: busybox
              command: ["sh", "-c", "echo 'Hello from BusyBox'"]
          restartPolicy: Never

9) Create DaemonSet using manifest file (Daemonset is like in docker global service one node per one container here one node per one pod)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: banking-ds
  labels:
    app: bank
spec:
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
        - name: bank-cont
          image: charanvardhan/internetbanking:v1

10) Create Deployment and Service Clusterip(with clusterip we cant expose our application to outside) within cluster only we can access 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-dp
  labels:
    app: bank
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
        - name: bank-cont
          image: charanvardhan/loans:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: banking-svc
spec:
  type: ClusterIP
  selector:
    app: bank
  ports:
    - port: 80
      targetPort: 80

11) Create Deployment and Service NodePort (we can expose application to outside world but with static port number like ec2 node ip public addr and node port range 30000-32767) http://3.6.88.232:31122/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-dp
  labels:
    app: bank
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
        - name: bank-cont
          image: charanvardhan/loans:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: banking-svc
spec:
  type: NodePort
  selector:
    app: bank
  ports:
    - port: 80 ==> its service port
      targetPort: 80 ==> its pod's container port
      nodePort: 31122 ==> its node port

